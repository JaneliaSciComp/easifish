ransac:
  blob_sizes: [6, 14]
  alignment_spacing: 4.0
  nspots: 2000
  num_sigma_max: 6
  cc_radius: 15
  match_threshold: 0.5
  max_spot_match_distance:
  point_matches_threshold: 50
  align_threshold: 2.0
  diagonal_constraint: 0.5
  fix_spots_count_threshold: 25
  fix_spot_detection_kwargs:
    blob_method: log
    threshold: 0.0001
    threshold_rel: 0.001
    winsorize_limits: [0.01, 0.02]
  mov_spots_count_threshold: 25
  mov_spot_detection_kwargs:
    blob_method: log
    threshold: 0.001
    threshold_rel: 0.01
    winsorize_limits: [0.01, 0.02]

global_align:
  steps: [affine]
  affine:
    initial_condition: CENTER
    alignment_spacing: 2.0
    shrink_factors: [2]
    smooth_sigmas: [2.0]
    optimizer: RSGD
    optimizer_args:
      learningRate: 2.0
      minStep: 0.01
      numberOfIterations: 400

local_align:
  steps: [ransac, affine, deform]
  block_size: [128, 128, 128]
  block_overlap: 0.125
  affine:
    alignment_spacing: 2.0
    shrink_factors: [2]
    smooth_sigmas: [2.0]
    metric: MMI
    optimizer: RSGD
    optimizer_args:
      learningRate: 0.25
      minStep: 0.0001
      numberOfIterations: 200
  deform:
    alignment_spacing: 1.0
    control_point_spacing: 128.0
    control_point_levels: [1]
    shrink_factors: [1]
    smooth_sigmas: [1.0]
    metric: MMI
    optimizer: GD
    optimizer_args:
      learningRate: 0.5
      convergenceMinimumValue: 0.0001
      numberOfIterations: 300
