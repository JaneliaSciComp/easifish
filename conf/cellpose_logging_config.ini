[loggers]
keys=root,cellpose,dask,distributed,distributed_segmentation

[handlers]
keys=consoleHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler

[logger_cellpose]
level=DEBUG
qualname=cellpose
handlers=consoleHandler
propagate=0

[logger_distributed_segmentation]
level=DEBUG
qualname=segmentation
handlers=consoleHandler
propagate=0

[logger_distributed]
level=INFO
qualname=distributed
handlers=consoleHandler
propagate=0

[handler_consoleHandler]
class=StreamHandler
formatter=simpleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
formatter=simpleFormatter
args=('segmentation.log',)

[formatter_simpleFormatter]
format=%(asctime)s - %(threadName)s:%(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
